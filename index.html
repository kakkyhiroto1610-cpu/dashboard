<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Panel</title>
  
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f4f6f8;
}

/* 全体 */
.container{
  padding:20px;
}

/* 時計 */
.clock{
  text-align:center;
  height:120px;   /* 高さを固定 */
  flex-shrink:0;  /* 縮まないようにする */
}

#time{
  font-size:64px;
  font-weight:bold;
}

#date{
  color:#666;
  font-size:18px;
}

/* 2列グリッド */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* カード */
.card{
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* ===== 1366x768 固定 ===== */

html, body{
  margin:0;
  padding:0;
  background:#e9edf2;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px 20px; /* 横広げる */
  box-sizing:border-box;
  gap:30px;
}

/* 時計エリア */
.clock{
  text-align:center;
  flex:0 0 auto;
}

#time{
  font-size:88px;
  font-weight:bold;
}

#date{
  font-size:20px;
  color:#666;
}

/* 2×2グリッド */
.grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:0.8fr 1.12fr; /* 下段を少し大きく */
  gap:30px;
  min-height:0;
}

.card{
  background:white;
  border-radius:30px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* iframeはカードいっぱいに */
.card iframe{
  flex:1;
  width:100%;
  height:100%;
  border:0;
}

/* ゲージ */
.gauge{
  width:200px;
  height:200px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:bold;
  background:conic-gradient(#2d8cff 0% 10%, #eee 10% 100%);
}
  
/* ===== 天気 横並び固定 ===== */

.weather-main{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.weather-icon{
  font-size:40px;
}

.weather-temp{
  font-size:42px;
  font-weight:bold;
}

.weather-desc{
  margin-top:8px;
  font-size:16px;
  color:#555;
}

.weather-sub{
  margin-top:5px;
  color:#777;
}

/* ゲージ */
.gauge{
  width:150px;
  height:150px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  background:conic-gradient(#2d8cff 0% 10%, #eee 10% 100%);
}

  .clock{
  text-align:center;
  margin-bottom:20px;
}

#time{
  font-size:88px;
  font-weight:bold;
  line-height:1.1;
}

#date{
  font-size:22px;
  color:#666;
}

  
</style>
</head>

<body>
<div class="container">

<div class="clock">
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="grid">

<div class="card">
  <h3>今日の天気（札幌）</h3>
  <div class="weather-card">
    <div class="weather-main">
      <div class="weather-icon">☁️</div>
      <div class="weather-temp" id="temp">-3°</div>
    </div>
    <div class="weather-desc" id="desc">薄い雲</div>
    <div class="weather-sub">
      湿度 <span id="humidity">61%</span>
    </div>
    <div class="forecast" id="forecast"></div>
  </div>
</div>

<div class="card">
  <h3>現在の外気温</h3>
  <div class="gauge" id="tempGauge">--°C</div>
</div>

<div class="card">
  <h3>今日の予定</h3>
  <iframe
  src="https://calendar.google.com/calendar/embed?src=kakky.hiroto1610@gmail.com&ctz=Asia/Tokyo"
  style="border: 0"
  width="100%"
  height="500"
  frameborder="0"
  scrolling="no">
</iframe>


</div>

<div class="card">
  <h3>ゴミ予定</h3>
  <iframe
    src="https://calendar.google.com/calendar/embed?src=e556b1204b6f7b6d8e3530ed3b7a36c9377800916a6e6e0eae87105e6cafe9bf%40group.calendar.google.com&ctz=Asia%2FTokyo&mode=MONTH&showTitle=0&showTabs=0&showCalendars=0&showTz=0"
    style="border:0"
    width="100%"
    height="450">
  </iframe>
</div>

</div>
</div>

<script>
/* ===== 時計 ===== */
function updateClock(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString("ja-JP",{hour12:false});

  document.getElementById("date").innerText =
    now.toLocaleDateString("ja-JP",
      {year:"numeric",month:"long",day:"numeric",weekday:"long"});
}

setInterval(updateClock,1000);
updateClock();
</script>

  
</body>

</html>
