<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Panel</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f4f6f8;
}

.container{
  padding:30px;
}

.clock{
  text-align:center;
  margin-bottom:30px;
}

#time{
  font-size:64px;
  font-weight:bold;
}

#date{
  color:#666;
  font-size:18px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:white;
  padding:24px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.gauge{
  width:180px;
  height:180px;
  border-radius:50%;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  background:conic-gradient(#2d8cff 0% 10%, #eee 10% 100%);
}

/* 天気カードを縦スリム化 */
.weather-card {
  padding: 10px;
}

/* 中身を横並びに */
.weather-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* 温度を少し小さく */
.weather-temp {
  font-size: 25px;
}

.weather-icon {
  font-size: 30px;
}

  
/* ===== 天気デザイン ===== */
.weather-card{
  margin-top:10px;
}

.weather-main{
  display:flex;
  align-items:center;
  gap:20px;
}

.weather-icon{
  font-size:48px;
}

.weather-temp{
  font-size:48px;
  font-weight:bold;
}

.weather-desc{
  margin-top:10px;
  font-size:18px;
  color:#555;
}

.weather-sub{
  margin-top:8px;
  color:#777;
}

.forecast{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.forecast div{
  background:#f3f4f6;
  padding:12px;
  border-radius:14px;
  text-align:center;
  flex:1;
}

/* ===== タブレット最適化 ===== */
@media (max-width:1024px){
  .grid{
    grid-template-columns:1fr;
  }

  #time{
    font-size:80px;
  }

  .card{
    padding:30px;
  }

  .gauge{
    width:220px;
    height:220px;
    font-size:32px;
  }
}

/* ===== 1280x768 固定ダッシュボード ===== */

html, body {
  margin: 0;
  padding: 0;
  background: #e9edf2;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 全体を固定サイズに */
.dashboard {
  width: 1280px;
  height: 768px;
  background: #f4f6f9;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
  gap: 20px;
}

/* 時計 */
.clock {
  text-align: center;
  font-size: 72px;
  font-weight: bold;
}

/* 2段構成 */
.row {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  min-height: 0;
}

/* カード */
.card {
  background: white;
  border-radius: 25px;
  padding: 20px;
  box-sizing: border-box;
  overflow: hidden;
}

/* 見やすい文字サイズ */
.card h2 {
  font-size: 28px;
}

.big {
  font-size: 48px;
  font-weight: bold;
}
/* 時計 */
.clock {
  font-size: 80px;
  text-align: center;
  flex: 0 0 auto;
}

/* 2列エリア */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
  height: 100%;
}

/* カード */
.card {
  background: white;
  border-radius: 30px;
  padding: 30px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden; /* はみ出し防止 */
}

/* 文字サイズ調整（遠くから見える用） */
.card h2 {
  font-size: 36px;
}

.card .big {
  font-size: 60px;
  font-weight: bold;
}

.card .medium {
  font-size: 32px;
}
</style>
</head>

<body>
<div class="container">

<div class="clock">
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="grid">

<div class="card">
  <h3>今日の天気（札幌）</h3>
  <div class="weather-card">
    <div class="weather-main">
      <div class="weather-icon">☁️</div>
      <div class="weather-temp" id="temp">-3°</div>
    </div>
    <div class="weather-desc" id="desc">薄い雲</div>
    <div class="weather-sub">
      湿度 <span id="humidity">61%</span>
    </div>
    <div class="forecast" id="forecast"></div>
  </div>
</div>

<div class="card">
  <h3>現在の外気温</h3>
  <div class="gauge" id="tempGauge">--°C</div>
</div>

<div class="card">
  <h3>今日の予定</h3>
  <iframe
  src="https://calendar.google.com/calendar/embed?src=kakky.hiroto1610@gmail.com&ctz=Asia/Tokyo"
  style="border: 0"
  width="100%"
  height="500"
  frameborder="0"
  scrolling="no">
</iframe>


</div>

<div class="card">
  <h3>ゴミ予定</h3>
  <iframe
    src="https://calendar.google.com/calendar/embed?src=e556b1204b6f7b6d8e3530ed3b7a36c9377800916a6e6e0eae87105e6cafe9bf%40group.calendar.google.com&ctz=Asia%2FTokyo&mode=MONTH&showTitle=0&showTabs=0&showCalendars=0&showTz=0"
    style="border:0"
    width="100%"
    height="450">
  </iframe>
</div>

</div>
</div>

<script>
/* ===== 時計 ===== */
function updateClock(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString("ja-JP",{hour12:false});

  document.getElementById("date").innerText =
    now.toLocaleDateString("ja-JP",
      {year:"numeric",month:"long",day:"numeric",weekday:"long"});
}

setInterval(updateClock,1000);
updateClock();
</script>


  
</body>

</html>
