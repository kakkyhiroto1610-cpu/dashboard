<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Panel</title>

<style>
/* ===== 基本 ===== */
html, body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden;
  background:#f4f6f9;
  font-family:sans-serif;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:20px;
  box-sizing:border-box;
  gap:15px;
}

/* ===== 時計 ===== */
.clock{
  text-align:center;
  margin-bottom:5px;
}

#time{
  font-size:64px;
  font-weight:bold;
  line-height:1;
}

#date{
  font-size:18px;
  color:#666;
}

/* ===== グリッド ===== */
.grid{
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:20px;
  min-height:0;
}

/* 今日の予定を縦2段 */
.schedule{
  grid-row: span 2;
}

/* ===== カード ===== */
.card{
  background:white;
  border-radius:25px;
  padding:25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.card h3{
  margin:0 0 15px 0;
}

/* iframeは自動フィット */
.card iframe{
  flex:1;
  width:100%;
  border:0;
}

/* ===== 天気 ===== */
.weather-main{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.weather-icon{
  font-size:36px;
}

.weather-temp{
  font-size:42px;
  font-weight:bold;
}

.weather-desc{
  margin-top:8px;
  font-size:15px;
  color:#555;
}

.weather-sub{
  margin-top:5px;
  color:#777;
}
</style>
</head>

<body>
<div class="container">

<div class="clock">
  <div id="date"></div>
  <div id="time"></div>
</div>

<div class="grid">

  <!-- 今日の天気 -->
  <div class="card">
    <h3>今日の天気（札幌）</h3>
    <div class="weather-main">
      <div class="weather-icon">☁️</div>
      <div class="weather-temp">-3°</div>
    </div>
    <div class="weather-desc">薄い雲</div>
    <div class="weather-sub">湿度 61%</div>
  </div>

  <!-- 今日の予定（縦2段） -->
  <div class="card schedule">
    <h3>今日の予定</h3>
    <iframe
      src="https://calendar.google.com/calendar/embed?src=kakky.hiroto1610@gmail.com&ctz=Asia/Tokyo"
      scrolling="no">
    </iframe>
  </div>

  <!-- ゴミ予定 -->
  <div class="card">
    <h3>ゴミ予定</h3>
    <iframe
      src="https://calendar.google.com/calendar/embed?src=e556b1204b6f7b6d8e3530ed3b7a36c9377800916a6e6e0eae87105e6cafe9bf%40group.calendar.google.com&ctz=Asia%2FTokyo&mode=MONTH&showTitle=0&showTabs=0&showCalendars=0&showTz=0">
    </iframe>
  </div>

</div>
</div>

<script>
function updateClock(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString("ja-JP",{hour12:false});

  document.getElementById("date").innerText =
    now.toLocaleDateString("ja-JP",
      {year:"numeric",month:"long",day:"numeric",weekday:"long"});
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
